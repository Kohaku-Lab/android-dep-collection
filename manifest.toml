# android-dep-collection — wheel build manifest.
#
# Each ``[[wheel]]`` entry says: "fetch this upstream package at
# this version, cross-compile to all configured Android ABIs,
# upload the resulting wheels to the release."
#
# Add entries by appending a new ``[[wheel]]`` table.  Bump
# ``version`` to track upstream.  Commit + tag a release; CI does
# the rest.

# Android API level baked into the wheel platform tag.  24 =
# Android 7.0, matches Chaquopy's minSdk floor + the
# ANDROID_API_VERSION env var maturin reads.
android_api_level = 24

# ABIs we cross-compile for.  PyO3/maturin-action ships
# Android cross-prefixes for these two; armv7 / x86 aren't in
# the action's prefix map (and armv7 device share is ~10% and
# shrinking).
abis = ["arm64-v8a", "x86_64"]

# Python interpreter to build against.  Chaquopy 13 ships Python
# 3.13.7; the wheels need to be cp313-compatible.
python_version = "3.13"
chaquopy_python_full_version = "3.13.7"

# ─── Wheels to build ───────────────────────────────────────────

[[wheel]]
name = "pydantic-core"
# pyproject distribution name uses an underscore.
pypi_name = "pydantic_core"
# pydantic-core 2.41.x is what pydantic 2.13.x requires.  When
# bumping pydantic in KohakuTerrarium, check the corresponding
# pydantic-core pin in pydantic's pyproject and update here.
version = "2.41.1"
# pydantic-core's pyproject sets ``python-source`` and the maturin
# config is non-trivial.  We invoke maturin directly against the
# sdist rather than fighting with cargo workspace settings.
upstream = "https://github.com/pydantic/pydantic-core"
upstream_tag = "v2.41.1"

[[wheel]]
name = "safetensors"
pypi_name = "safetensors"
# 0.7.0 is the latest as of 2026-05.  Required by model2vec
# (KohakuTerrarium core dep — embeddings).  Per-CPython wheel
# (cp313-cp313), not abi3.
version = "0.7.0"
upstream = "https://github.com/huggingface/safetensors"
upstream_tag = "v0.7.0"
# safetensors is a monorepo; the Python bindings live under a
# subdir with its own pyproject.toml + maturin config.  build.py
# chdir's into this path before invoking maturin.
subdir = "bindings/python"

[[wheel]]
name = "tokenizers"
pypi_name = "tokenizers"
# 0.23.1 is the floor required by model2vec.  Per-CPython wheel.
# Note: tokenizers is large (~5MB stripped wheel) and pulls many
# transitive Rust deps; build can take 5-10 min per ABI.
version = "0.23.1"
upstream = "https://github.com/huggingface/tokenizers"
upstream_tag = "v0.23.1"
subdir = "bindings/python"

[[wheel]]
name = "primp"
pypi_name = "primp"
# 1.3.0 is the latest as of 2026-05.  Required by ddgs (web
# search tool).  Ships as abi3 (cp38-abi3) so one wheel covers
# Python 3.8+ — wheel-filename template is special-cased in
# postcreate.py's _ANDROID_URL_REFS.
#
# primp wraps reqwest with rustls-tls — no system OpenSSL needed.
# The repo is a Cargo workspace: the root ``Cargo.toml`` declares
# only ``[workspace]`` (no ``[package]``), so maturin's parse
# fails at the root with ``missing field `package` ``.  The
# Python-binding crate (the only one we want to ship as a wheel)
# lives at ``crates/primp-python/`` and has its own
# ``pyproject.toml`` + ``Cargo.toml``.  build.py chdir's into
# this subdir before invoking maturin — same mechanism as the
# huggingface monorepo entries.
version = "1.3.0"
upstream = "https://github.com/deedy5/primp"
upstream_tag = "v1.3.0"
subdir = "crates/primp-python"
